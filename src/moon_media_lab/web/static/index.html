<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moon Media Lab</title>
<style>
  :root {
    --bg: #0f1115; --panel: #181b22; --panel2: #1f232c; --border: #2a2f3a;
    --text: #e6e9ef; --muted: #8b93a5; --accent: #7aa2f7; --ok: #9ece6a;
    --warn: #e0af68; --err: #f7768e;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.6 -apple-system, "PingFang SC", "Segoe UI", sans-serif; }
  header { padding: 14px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; position: sticky; top: 0;
    background: var(--bg); z-index: 5; }
  header h1 { font-size: 17px; margin: 0; }
  .muted { color: var(--muted); font-size: 12px; }
  #running-banner { margin-left: auto; font-size: 12px; color: var(--warn);
    display: flex; align-items: center; gap: 8px; }
  .spinner { width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid var(--warn); border-top-color: transparent;
    animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  main { display: grid; grid-template-columns: 380px 1fr; gap: 16px;
    padding: 16px 24px; max-width: 1440px; margin: 0 auto; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .panel h2 { font-size: 13px; margin: 0 0 12px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em; }
  label { display: block; margin: 10px 0 4px; color: var(--muted); font-size: 12px; }
  input[type=text], select { width: 100%; padding: 8px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--panel2); color: var(--text); }
  input[type=file] { color: var(--muted); font-size: 12px; }
  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }
  button { padding: 7px 13px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--accent); color: #10131a; font-weight: 600; cursor: pointer;
    font-size: 13px; }
  button.secondary { background: var(--panel2); color: var(--text); font-weight: 400; }
  button.danger { background: transparent; color: var(--err);
    border-color: var(--err); font-weight: 400; padding: 2px 10px; font-size: 12px; }
  button.regen { background: var(--panel2); color: var(--ok); font-weight: 400; }
  button:disabled { opacity: .45; cursor: default; }
  .check { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; }
  .task, .job { padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 8px; background: var(--panel2); }
  .job { cursor: pointer; }
  .job:hover, .job.active { border-color: var(--accent); }
  .title { font-size: 13px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; }
  .meta { display: flex; gap: 8px; align-items: center; margin-top: 4px;
    flex-wrap: wrap; }
  .chip { font-size: 11px; padding: 1px 8px; border-radius: 999px;
    background: var(--border); color: var(--muted); white-space: nowrap; }
  .chip.s-done, .chip.s-finished { background: #1d2b1f; color: var(--ok); }
  .chip.s-failed, .chip.s-postprocess_failed { background: #33202a; color: var(--err); }
  .chip.s-cancelled { background: var(--border); color: var(--muted); }
  .chip.s-running, .chip.s-transcribing, .chip.s-downloading, .chip.s-extracting,
  .chip.s-postprocessing, .chip.s-preparing, .chip.s-queued {
    background: #2a2618; color: var(--warn); }
  .bar { height: 4px; background: var(--border); border-radius: 2px;
    margin-top: 6px; overflow: hidden; }
  .bar > div { height: 100%; background: var(--accent); transition: width .5s; }
  .err-text { color: var(--err); font-size: 11px; margin-top: 4px; word-break: break-all; }
  #segments { margin-top: 12px; max-height: 60vh; overflow-y: auto;
    border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
  .seg { display: flex; gap: 10px; padding: 6px 8px; border-radius: 6px;
    cursor: pointer; }
  .seg:hover { background: var(--panel2); }
  .seg.playing { background: #22304a; }
  .ts { color: var(--accent); font-family: ui-monospace, monospace;
    font-size: 12px; white-space: nowrap; padding-top: 2px; }
  .spk { color: var(--warn); font-size: 12px; white-space: nowrap; padding-top: 2px; }
  .artifacts { margin: 10px 0; }
  .artifacts a { color: var(--accent); text-decoration: none; margin-right: 12px;
    font-size: 12px; }
  audio { width: 100%; margin: 8px 0; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .empty { color: var(--muted); padding: 24px 0; text-align: center; font-size: 13px; }
  .follow { float: right; font-size: 12px; color: var(--muted); cursor: pointer;
    user-select: none; }
  #toast { position: fixed; bottom: 20px; right: 20px; background: var(--panel2);
    border: 1px solid var(--accent); padding: 10px 16px; border-radius: 8px;
    display: none; z-index: 10; }
</style>
</head>
<body>
<header>
  <h1>🌙 Moon Media Lab</h1>
  <span class="muted" id="version"></span>
  <span id="running-banner"></span>
</header>
<main>
  <div>
    <div class="panel">
      <h2>新任务</h2>
      <label>媒体来源（URL 或本地路径）</label>
      <input type="text" id="source" placeholder="https://... 或 /path/to/file.m4a">
      <label>或上传文件</label>
      <input type="file" id="file">
      <div class="row">
        <div>
          <label>语言</label>
          <select id="language">
            <option value="zh">中文</option>
            <option value="en">英文</option>
            <option value="auto">自动</option>
            <option value="mixed">中英混合</option>
          </select>
        </div>
        <div>
          <label>转写完成后</label>
          <select id="mode">
            <option value="transcript">仅转写</option>
            <option value="knowledge">+ 知识笔记</option>
            <option value="english-study">+ 英语学习</option>
            <option value="skill">+ SOP 草稿</option>
          </select>
        </div>
      </div>
      <div class="check">
        <input type="checkbox" id="diarization">
        <label for="diarization" style="margin:0">说话人分离（中文对谈/访谈，耗时约为音频的 1/3）</label>
      </div>
      <div style="margin-top:14px"><button id="submit">开始转写</button></div>
    </div>
    <div class="panel">
      <h2>执行队列</h2>
      <div id="tasks"><div class="empty">空闲</div></div>
    </div>
    <div class="panel">
      <h2>历史任务</h2>
      <div id="jobs"><div class="empty">暂无</div></div>
    </div>
  </div>
  <div class="panel" id="detail">
    <h2>任务详情</h2>
    <div class="empty">选择左侧任务查看</div>
  </div>
</main>
<div id="toast"></div>
<script>
const $ = (s) => document.querySelector(s);
const STATUS_ZH = {
  queued: "排队中", running: "执行中", finished: "已完成", failed: "失败",
  cancelled: "已取消", preparing: "准备中", downloading: "下载中",
  extracting: "提取音频", transcribing: "转写中", postprocessing: "后处理中",
  postprocess_failed: "后处理失败", done: "完成", unknown: "—",
};
const zh = (s) => STATUS_ZH[s] || s;
let currentJob = null, segmentsFor = null, follow = true;

function toast(msg) {
  const el = $("#toast");
  el.textContent = msg; el.style.display = "block";
  setTimeout(() => el.style.display = "none", 3500);
}
function fmtTs(sec) {
  sec = Math.floor(sec);
  return [3600, 60, 1].map(u => String(Math.floor(sec / u) % (u === 3600 ? 99 : 60))
    .padStart(2, "0")).join(":");
}

async function refresh() {
  try {
    const [status, jobsRes] = await Promise.all([
      fetch("/api/status").then(r => r.json()),
      fetch("/api/jobs").then(r => r.json()),
    ]);
    $("#version").textContent = "v" + status.version;
    renderTasks(status.tasks);
    const anyActive = status.tasks.some(t => ["queued", "running"].includes(t.status));
    renderJobs(jobsRes.jobs, anyActive);
    const running = status.tasks.find(t => t.status === "running");
    $("#running-banner").innerHTML = running
      ? `<span class="spinner"></span> ${running.kind}：${running.label}` : "";
    if (currentJob) {
      const job = jobsRes.jobs.find(j => j.id === currentJob);
      if (job) updateDetailHeader(job);
    }
  } catch (e) { /* server restarting */ }
}

function renderTasks(tasks) {
  const box = $("#tasks");
  const active = tasks.filter(t => ["queued", "running"].includes(t.status));
  const recent = tasks.filter(t => !["queued", "running"].includes(t.status)).slice(0, 5);
  if (!active.length && !recent.length) {
    box.innerHTML = '<div class="empty">空闲</div>'; return;
  }
  box.innerHTML = "";
  for (const t of [...active, ...recent]) {
    const div = document.createElement("div");
    div.className = "task";
    const cancellable = ["queued", "running"].includes(t.status);
    div.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px">
        <span class="chip s-${t.status}">${zh(t.status)}</span>
        <span class="title" style="flex:1">${t.kind} · ${t.label}</span>
        ${cancellable ? `<button class="danger" data-cancel="${t.id}">取消</button>` : ""}
      </div>
      ${t.started_at ? `<div class="muted" style="font-size:11px;margin-top:2px">开始于 ${t.started_at}</div>` : ""}
      ${t.error ? `<div class="err-text">${t.error}</div>` : ""}`;
    box.appendChild(div);
  }
  box.querySelectorAll("[data-cancel]").forEach(btn => btn.onclick = async (e) => {
    e.stopPropagation();
    const res = await fetch(`/api/queue/${btn.dataset.cancel}/cancel`, {method: "POST"})
      .then(r => r.json());
    toast(res.cancelled
      ? (res.was === "running" ? "已终止（进度已存档，可续跑）" : "已从队列移除")
      : "无法取消：" + res.reason);
  });
}

const ACTIVE_STATES = ["preparing", "downloading", "extracting", "transcribing",
  "postprocessing"];

function renderJobs(jobs, anyActive) {
  const box = $("#jobs");
  if (!jobs.length) { box.innerHTML = '<div class="empty">暂无</div>'; return; }
  box.innerHTML = "";
  for (const job of jobs) {
    const div = document.createElement("div");
    div.className = "job" + (job.id === currentJob ? " active" : "");
    const src = (job.state.source || (job.input && job.input.media.source) || job.id)
      .split("/").pop();
    const st = job.state;
    // A job stuck in an active state with nothing running was interrupted.
    const stalled = ACTIVE_STATES.includes(job.status) && !anyActive;
    const statusLabel = stalled ? "已中断（可续跑）" : zh(job.status);
    const statusClass = stalled ? "s-cancelled" : `s-${job.status}`;
    let progress = "";
    if (st.chunks_total && job.status === "transcribing" && !stalled) {
      progress = `${st.chunks_done || 0}/${st.chunks_total} 块` +
        (st.eta_sec ? ` · 剩余约 ${fmtTs(st.eta_sec)}` : "");
    }
    div.innerHTML = `
      <div class="title">${src}</div>
      <div class="meta">
        <span class="chip ${statusClass}">${statusLabel}</span>
        <span class="muted" style="font-size:11px">${job.id.replace("transcribe-", "")}</span>
        ${progress ? `<span class="muted" style="font-size:11px">${progress}</span>` : ""}
      </div>
      ${st.percent != null && job.status !== "done"
        ? `<div class="bar"><div style="width:${st.percent}%"></div></div>` : ""}
      ${st.error ? `<div class="err-text">${st.error.slice(0, 160)}</div>` : ""}`;
    div.onclick = () => openJob(job.id);
    box.appendChild(div);
  }
}

function updateDetailHeader(job) {
  const h = $("#detail-status");
  if (h) h.innerHTML = `<span class="chip s-${job.status}">${zh(job.status)}</span>`;
  if (job.status === "done" && segmentsFor !== job.id) loadDetail(job.id);
}

async function openJob(id) {
  currentJob = id; segmentsFor = null;
  loadDetail(id);
}

async function loadDetail(id) {
  const detail = $("#detail");
  const job = await fetch(`/api/jobs/${id}`).then(r => r.json());
  const has = (name) => job.artifacts.includes(name);
  const busy = !["done", "failed", "postprocess_failed", "unknown"].includes(job.status);

  const procBtn = (label, exists, payload) => {
    const cls = exists ? "regen" : "secondary";
    const text = exists ? `${label} ✓（重新生成）` : `生成${label}`;
    const confirmMsg = exists ? `${label}已存在，重新生成会覆盖，继续？` : null;
    return `<button class="${cls}" ${busy ? "disabled" : ""}
      data-proc='${JSON.stringify(payload)}' data-confirm="${confirmMsg || ""}">${text}</button>`;
  };

  let html = `<h2>${job.id} <span id="detail-status"><span class="chip s-${job.status}">${zh(job.status)}</span></span></h2>`;
  html += `<div class="actions">
    ${procBtn("知识笔记", has("knowledge.md"), {mode: "knowledge"})}
    ${procBtn("清理全文", has("transcript.clean.md"), {clean: true, force: has("transcript.clean.md")})}
    ${procBtn("说话人命名", false, {name_speakers: true})}
    ${job.status === "failed" || has("transcript.partial.md") ||
      (ACTIVE_STATES.includes(job.status) && !has("transcript.raw.json"))
      ? `<button class="secondary" id="resume-btn">续跑</button>` : ""}
  </div>`;
  html += `<div class="artifacts">` + job.artifacts
    .filter(a => !["audio.wav", "state.json", "input.json", "media.json"].includes(a))
    .map(a => `<a href="/api/jobs/${id}/file/${a}" target="_blank">${a}</a>`).join("") +
    `</div>`;
  if (has("audio.wav")) {
    html += `<audio id="player" controls preload="none" src="/api/jobs/${id}/file/audio.wav"></audio>`;
  }

  const segRes = await fetch(`/api/jobs/${id}/segments`);
  if (segRes.ok) {
    const data = await segRes.json();
    html += `<div><span class="follow" id="follow-toggle">跟随播放 ✓</span></div>`;
    html += `<div id="segments">`;
    for (let i = 0; i < data.segments.length; i++) {
      const seg = data.segments[i];
      html += `<div class="seg" data-i="${i}" data-t="${seg.start}" data-e="${seg.end}">
        <span class="ts">${fmtTs(seg.start)}</span>
        ${seg.speaker ? `<span class="spk">${seg.speaker}</span>` : ""}
        <span>${seg.text}</span></div>`;
    }
    html += `</div>`;
  } else if (has("transcript.partial.md")) {
    const partial = await fetch(`/api/jobs/${id}/file/transcript.partial.md`).then(r => r.text());
    html += `<div class="muted" style="margin-top:10px">转写进行中，以下为已完成部分：</div>
      <pre style="white-space:pre-wrap;font:inherit">${partial.slice(0, 20000)}</pre>`;
  } else {
    html += `<div class="empty">转写完成后此处显示分段文本</div>`;
  }
  detail.innerHTML = html;
  segmentsFor = id;
  bindDetail(id);
}

function bindDetail(id) {
  const detail = $("#detail");
  const player = $("#player");
  detail.querySelectorAll("[data-proc]").forEach(btn => btn.onclick = async () => {
    const confirmMsg = btn.dataset.confirm;
    if (confirmMsg && !window.confirm(confirmMsg)) return;
    const res = await fetch(`/api/jobs/${id}/process`, {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify(Object.assign({llm: "auto"}, JSON.parse(btn.dataset.proc))),
    });
    toast(res.ok ? "已加入执行队列" : "提交失败：" + (await res.text()).slice(0, 120));
  });
  const resumeBtn = $("#resume-btn");
  if (resumeBtn) resumeBtn.onclick = async () => {
    const res = await fetch(`/api/jobs/${id}/resume`, {method: "POST"});
    toast(res.ok ? "续跑已加入队列" : "提交失败");
  };
  const toggle = $("#follow-toggle");
  if (toggle) toggle.onclick = () => {
    follow = !follow;
    toggle.textContent = follow ? "跟随播放 ✓" : "跟随播放 ✗";
  };
  detail.querySelectorAll(".seg").forEach(el => el.onclick = () => {
    if (player) { player.currentTime = +el.dataset.t; player.play(); }
  });
  if (player) player.ontimeupdate = () => {
    const t = player.currentTime;
    const segs = detail.querySelectorAll(".seg");
    let hit = null;
    for (const el of segs) {
      const match = t >= +el.dataset.t && t < +el.dataset.e;
      el.classList.toggle("playing", match);
      if (match) hit = el;
    }
    if (hit && follow) hit.scrollIntoView({block: "center", behavior: "smooth"});
  };
}

$("#submit").onclick = async () => {
  let source = $("#source").value.trim();
  const fileInput = $("#file");
  $("#submit").disabled = true;
  try {
    if (!source && fileInput.files.length) {
      const form = new FormData();
      form.append("file", fileInput.files[0]);
      toast("上传中…");
      const up = await fetch("/api/upload", {method: "POST", body: form}).then(r => r.json());
      source = up.path;
    }
    if (!source) { toast("请输入 URL/路径或选择文件"); return; }
    const res = await fetch("/api/jobs", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        source,
        language: $("#language").value,
        mode: $("#mode").value,
        diarization: $("#diarization").checked,
      }),
    });
    if (res.ok) { toast("已加入执行队列"); $("#source").value = ""; fileInput.value = ""; }
    else toast("提交失败：" + (await res.text()).slice(0, 120));
  } finally { $("#submit").disabled = false; }
};

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
